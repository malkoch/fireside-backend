{% extends "shared.html" %}
{% block content %}

<style>
    .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, .72);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999;
    }

    .hidden {
        display: none;
    }

    .modal-card {
        width: 460px;
        background: #313338;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, .45);
    }

    .modal-card h2 {
        margin-bottom: 8px;
    }

    .subtitle {
        color: #b5bac1;
        margin-bottom: 22px;
    }

    .modal-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px;
        margin-bottom: 12px;
        border-radius: 10px;
        background: #2b2d31;
        border: 1px solid #45474d;
        color: white;
        cursor: pointer;
    }

    .modal-btn span {
        font-size: 26px;
    }

    .modal-btn div {
        flex: 1;
        margin-left: 16px;
        text-align: left;
    }

    .modal-btn:hover {
        background: #404249;
    }

    .cancelBtn {
        margin-top: 10px;
        width: 100%;
        padding: 12px;
        background: none;
        border: none;
        color: #b5bac1;
        cursor: pointer;
    }

    .modal input {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: none;
        background: #1e1f22;
        color: white;
        margin-top: 16px;
    }

    .actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 20px;
    }

    .primary {
        background: #5865F2;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
    }

    .secondary {
        background: #4a4d55;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
    }
</style>

<div class="app">
    <!-- LEFT -->
    <div class="camp-list col-lg-3">
        <div id="camp-0" class="camp active" onclick="campDetail(0)">🏠</div>
        <div class="divider"></div>
        <div id="camp-list"></div>
        <div style="flex:1"></div>
        <div class="camp add" onclick="showCampModal();">+</div>
    </div>
    <!-- MIDDLE -->
    <div class="camp-detail col-lg-9">
    </div>
</div>

<div id="camp-modal" class="modal hidden">
    <div class="modal-card">
        <div id="modalHome">
            <h2>Create a Server</h2>
            <p class="subtitle">Create your own server or join an existing one.</p>
            <button class="modal-btn createBtn" onclick="showCreateCamp();">
                <span>🛠️</span>
                <div>
                    <strong>Create My Own</strong>
                    <small>Start from scratch</small>
                </div>
                ➜
            </button>
            <button class="modal-btn joinBtn" onclick="showJoinCamp();">
                <span>🔗</span>
                <div>
                    <strong>Join a Server</strong>
                    <small>Use an invite link</small>
                </div>
                ➜
            </button>
            <button class="cancelBtn" onclick="closeCampModal();">Cancel</button>
        </div>
        <div id="joinView" class="hidden">
            <h2>Join a Server</h2>
            <p class="subtitle">Enter an invite below.</p>
            <input id="inviteInput" placeholder="first-camp" value="first-camp">
            <div class="actions">
                <button class="secondary backBtn" onclick="closeJoinCamp();">Back</button>
                <button class="primary" onclick="joinCamp();">Join Server</button>
            </div>
        </div>
        <div id="createView" class="hidden">
            <h2>Create Your Server</h2>
            <input id="serverName" placeholder="first-camp" value="first-camp">
            <input class="form-control icon" name="icon" placeholder="Icon" type="file">
            <img name="icon-preview" src="" style="display: none;">
            <div class="actions">
                <button class="secondary backBtn" onclick="closeCreateCamp();">Back</button>
                <button class="primary" onclick="createCamp();">Create</button>
            </div>
        </div>
    </div>
</div>

<script>
    function showCampModal() {
        $('#camp-modal').removeClass('hidden');
    }

    function closeCampModal() {
        $('#camp-modal').addClass('hidden');
    }

    function showCreateCamp() {
        $('#modalHome').addClass('hidden');

        $('#createView').removeClass('hidden');
    }

    function closeCreateCamp() {
        $('#modalHome').removeClass('hidden');

        $('#createView').addClass('hidden');
    }

    function showJoinCamp() {
        $('#modalHome').addClass('hidden');

        $('#joinView').removeClass('hidden');
    }

    function closeJoinCamp() {
        $('#modalHome').removeClass('hidden');

        $('#joinView').addClass('hidden');
    }

    function createCamp() {
        $.ajax({
            type: 'POST',
            url: '/proxy/post',
            data: JSON.stringify({
                'controller': 'camp',
                'action': 'create',
                'data': {
                    'name': $('#serverName').val(),
                    'icon': $('img[name=icon-preview]').attr('src')
                }
            }),
            dataType: 'application/json',
            contentType: 'application/json',
            success: function (data) {
            }
        });
    }

    function joinCamp() {
        $.ajax({
            type: 'POST',
            url: '/proxy/post',
            data: JSON.stringify({
                'controller': 'camp',
                'action': 'join',
                'data': {
                    'name': $('#inviteInput').val()
                }
            }),
            dataType: 'application/json',
            contentType: 'application/json',
            success: function (data) {
            }
        });
    }

    function campDetail(campId) {
        $('.camp.active').removeClass('active');
        $('#camp-' + campId).addClass('active');

        if (campId == 0) {

        } else {
            $.ajax({
                type: 'GET',
                url: '/camp/detail?camp_id=' + campId,
                // dataType: 'application/json',
                contentType: 'application/json',
                success: function (data) {
                    $('.camp-detail').html(data);
                }
            });
        }
    }

    function showCamp(camp) {
        $('#camp-list').append(
            '<div id="camp-' + camp.id + '" class="camp" onclick="campDetail(' + camp.id + ')"><img src="/image/' + camp.id + '" style="width: 48px;"/></div>'
        )
    }

    function getUserCamps() {
        $.ajax({
            type: 'GET',
            url: '/proxy/get',
            data: {
                'controller': 'camp',
                'action': 'user-camps',
                'data': {}
            },
            // dataType: 'application/json',
            contentType: 'application/json',
            success: function (data) {
                $.each(data, function (idx, camp) {
                    showCamp(camp);
                });
            }
        });
    }

    $(document).ready(function () {
        const inputElements = document.querySelectorAll('.icon');

        inputElements.forEach(inputElement => {
            inputElement.addEventListener('change', handleFileChange);
        });

        function handleFileChange(event) {
            const file = event.target.files[0];
            const preview = event.target.nextElementSibling;

            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const fileContent = e.target.result;
                    preview.src = fileContent;
                };
                reader.onerror = function (e) {
                };
                reader.readAsDataURL(file);
            }
        }

        getUserCamps();

        var socket = new WebSocket("ws://127.0.0.1:5000/gateway");

        socket.addEventListener('message', (event) => {
            console.log('new message from websocket: ' + event.data);
        });

        setInterval(() => {
            socket.send(JSON.stringify({'op': 'HEARTBEAT'}));
        }, 1000);
    });
</script>

{% endblock %}
