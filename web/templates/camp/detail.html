{% extends "shared.html" %}
{% block content %}

<div class="col-lg-12 row">
    <div class="col-lg-6">
        <label for="name">Name: </label>
        <input type="text" id="name" name="name" value="first-fire" style="width: 90%;"/>
    </div>
    <div class="col-lg-6">
        <button type="button" onclick="create();">Create</button>
    </div>
</div>

{% for fire in fires %}
<div class="col-lg-12 row">
    <div class="col-lg-6">
        {{ fire.name }}
    </div>

    <div class="col-lg-6">
        <button type="button" onclick="join('{{ fire.id }}')">Join</button>
        <button type="button" onclick="detail('{{ fire.id }}')">Detail</button>
    </div>
</div>
{% endfor %}

<script>
    function create() {
        $.ajax({
            type: 'POST',
            url: '/fire/create',
            data: JSON.stringify({
                'camp_id': '{{ camp_id }}',
                'name': $('#name').val(),
                'type': 1
            }),
            dataType: 'application/json',
            contentType: 'application/json',
            success: function (data) {
                window.location.reload();
            }
        });
    }

    function join(fireId) {
        $.ajax({
            type: 'POST',
            url: '/fire/join',
            data: JSON.stringify({
                'fire_id': fireId
            }),
            dataType: 'application/json',
            contentType: 'application/json',
            success: function (data) {
                window.location.reload();
            }
        });
    }

    function detail(fireId) {
        window.open('/fire/detail?fire_id=' + fireId, '_blank');
    }
</script>

{% endblock %}
